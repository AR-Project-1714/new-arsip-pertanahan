<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1">
  <meta name="description" content="SIAP Loktuan — Detail Riwayat Kepemilikan.">
  <title>SIAP Loktuan — Detail Riwayat</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js@10.2.0/public/assets/styles/choices.min.css">
  <link rel="stylesheet" href="assets/styles.css">

  <script src="https://cdn.jsdelivr.net/npm/choices.js@10.2.0/public/assets/scripts/choices.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="assets/store.js"></script>
  <script type="text/babel" src="assets/components.js"></script>
  <script type="text/babel" src="assets/app.js"></script>

  <script type="text/babel">
const { useState } = React;

function DetailRiwayat({ state, parcelId, go }) {
  const p = state.parcels.find((x) => x.id === parcelId);
  const toast = useToast();
  const [previewDoc, setPreviewDoc] = useState(null);

  if (!p) {
    return (
      <div className="card card-pad" data-screen-label="Detail Riwayat">
        <div style={{ textAlign: "center", padding: "40px 0", color: "var(--ink-3)" }}>
          <Icon name="alert" size={32}/>
          <div style={{ fontWeight: 600, color: "var(--ink-1)", marginTop: 8 }}>Surat tanah tidak ditemukan</div>
          <Btn variant="primary" icon="chevron-left" style={{ marginTop: 14 }} onClick={() => go("data-tanah")}>Kembali ke Data Tanah</Btn>
        </div>
      </div>
    );
  }

  const archives = state.archives
    .filter((a) => a.parcelId === p.id)
    .sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

  const openDoc = (a, doc) => {
    setPreviewDoc({ archive: a, doc });
    setTimeout(() => { window.SIADP._onView && window.SIADP._onView(a.id + "/" + doc); }, 0);
    toast.info("Membuka pratinjau dokumen", doc + " — audit VIEW_FILE tercatat");
  };

  return (
    <div data-screen-label="Detail Riwayat">
      <div className="card card-pad" style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 24, alignItems: "stretch" }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <Btn size="sm" variant="ghost" icon="chevron-left" onClick={() => go("data-tanah")}>Kembali</Btn>
            <span style={{ color: "var(--ink-4)" }}>·</span>
            <span className="mono" style={{ color: "var(--ink-3)", fontSize: 12.5 }}>{p.kode}</span>
          </div>
          <h2 style={{ margin: 0, fontSize: 22, letterSpacing: "-0.01em" }}>{p.alamat}</h2>
          <div style={{ color: "var(--ink-3)", marginTop: 4, fontSize: 13.5 }}>RT {p.rt} / RW {p.rw} · Kelurahan {p.kelurahan || "Loktuan"}</div>

          <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
            <StatusBadge status={p.status}/>
            <Badge variant="muted">Nomor Surat <span className="mono" style={{ marginLeft: 4 }}>{p.nomorSurat || "—"}</span></Badge>
            <Badge variant="muted">NOP <span className="mono" style={{ marginLeft: 4 }}>{p.nop}</span></Badge>
            <Badge variant="muted">Luas {p.luas} m²</Badge>
            <Badge variant="primary"><Icon name="user" size={12}/> {p.pemilikSaatIni}</Badge>
          </div>

          <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
            <Btn variant="primary" icon="plus" onClick={() => go("arsip-baru", p.id)}>Tambah Peralihan</Btn>
            <Btn variant="ghost" icon="file-text" onClick={() => openDoc({ id: "surat-" + p.id, nomorSPPHT: p.nomorSurat, tanggal: p.tanggalDaftar, jenis: p.jenisSurat || "SPPHT", pengalih: { nama: "—", nik: "—" }, penerima: { nama: p.pemilikSaatIni, nik: "—" } }, "Surat Tanah")}>Lihat Surat Tanah</Btn>
          </div>
        </div>

        <div className="map-preview">
          <div className="label">Sketsa bidang · {p.kode}</div>
          <svg viewBox="0 0 320 180" className="parcel" preserveAspectRatio="none">
            <polygon points="60,40 250,30 270,140 80,150" fill="oklch(96% 0.04 195 / 0.85)" stroke="oklch(42% 0.07 195)" strokeWidth="2" strokeDasharray="4 3"/>
            <text x="160" y="95" textAnchor="middle" fontFamily="JetBrains Mono" fontSize="11" fill="oklch(35% 0.06 195)">{p.luas} m²</text>
            <text x="160" y="20" textAnchor="middle" fontFamily="JetBrains Mono" fontSize="9" fill="oklch(40% 0.05 195)">U: {p.batas.utara}</text>
            <text x="160" y="170" textAnchor="middle" fontFamily="JetBrains Mono" fontSize="9" fill="oklch(40% 0.05 195)">S: {p.batas.selatan}</text>
            <text x="10" y="95" textAnchor="start" fontFamily="JetBrains Mono" fontSize="9" fill="oklch(40% 0.05 195)">B</text>
            <text x="310" y="95" textAnchor="end" fontFamily="JetBrains Mono" fontSize="9" fill="oklch(40% 0.05 195)">T</text>
          </svg>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1fr", gap: 16, marginTop: 16 }}>
        <div className="card">
          <div className="card-head">
            <div style={{ flex: 1 }}>
              <h3>Riwayat Kepemilikan</h3>
              <div className="sub">Chain of title dari arsip SPPHT yang tersimpan.</div>
            </div>
            <Badge variant="muted">{archives.length} peralihan</Badge>
          </div>
          <div className="card-pad">
            {archives.length === 0 ? (
              <div style={{ padding: 30, textAlign: "center", color: "var(--ink-3)" }}>
                <Icon name="info" size={24}/>
                <div style={{ fontWeight: 600, color: "var(--ink-1)", marginTop: 6 }}>Surat tanah baru</div>
                <div style={{ marginTop: 4 }}>Belum ada arsip SPPHT. Tambahkan peralihan pertama untuk membangun rantai kepemilikan.</div>
              </div>
            ) : (
              <div className="timeline">
                {archives.map((a, i) => (
                  <div key={a.id} className={"tl-item " + (i === 0 ? "first" : "")}>
                    <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                      <Badge variant={a.jenis === "Waris" ? "info" : a.jenis === "Hibah" ? "warning" : "primary"}>{a.jenis}</Badge>
                      <span className="mono" style={{ fontSize: 12 }}>{a.nomorSPPHT}</span>
                      <span style={{ color: "var(--ink-3)", fontSize: 12 }}>· {SIADP.formatDate(a.tanggal)}</span>
                      {a.rekonstruksi && <Badge variant="warning">Rekonstruksi historis</Badge>}
                    </div>
                    <div style={{ marginTop: 10, display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 14, alignItems: "center" }}>
                      <div style={{ background: "var(--bg-soft)", border: "1px solid var(--line)", borderRadius: 10, padding: 12 }}>
                        <div style={{ fontSize: 11, color: "var(--ink-3)", textTransform: "uppercase", letterSpacing: "0.05em" }}>Pengalih · {a.pengalih.peran || "—"}</div>
                        <div style={{ fontWeight: 600, marginTop: 4 }}>{a.pengalih.nama}</div>
                        <div className="mono" style={{ fontSize: 11.5, color: "var(--ink-3)", marginTop: 2 }}>{SIADP.maskNik(a.pengalih.nik)}</div>
                        <div style={{ marginTop: 6 }}><StatusBadge status={a.pengalih.status}/></div>
                      </div>
                      <Icon name="chevron-right" size={20}/>
                      <div style={{ background: "var(--primary-soft)", border: "1px solid transparent", borderRadius: 10, padding: 12 }}>
                        <div style={{ fontSize: 11, color: "var(--primary-ink)", textTransform: "uppercase", letterSpacing: "0.05em" }}>Penerima</div>
                        <div style={{ fontWeight: 600, marginTop: 4 }}>{a.penerima.nama}</div>
                        <div className="mono" style={{ fontSize: 11.5, color: "var(--ink-3)", marginTop: 2 }}>{SIADP.maskNik(a.penerima.nik)}</div>
                        <div style={{ marginTop: 6, fontSize: 11.5, color: "var(--ink-3)" }}>{[a.penerima.pekerjaan || a.penerima.jk, a.penerima.noHp || a.penerima.telp].filter(Boolean).join(" · ") || "—"}</div>
                      </div>
                    </div>
                    {a.catatan && <div style={{ marginTop: 10, fontSize: 12.5, color: "var(--ink-2)", fontStyle: "italic" }}>“{a.catatan}”</div>}
                    <div style={{ marginTop: 12, display: "flex", gap: 6, flexWrap: "wrap" }}>
                      {a.dokumen.map((d, j) => (
                        <button key={j} className="chip" onClick={() => openDoc(a, d)}>
                          <Icon name="file-text" size={12}/>{d}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="col">
          <div className="card card-pad">
            <h3 style={{ margin: 0, fontSize: 14 }}>Batas Tanah</h3>
            <div style={{ marginTop: 12, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {[["Utara", p.batas.utara], ["Selatan", p.batas.selatan], ["Timur", p.batas.timur], ["Barat", p.batas.barat]].map(([k, v]) => (
                <div key={k} style={{ padding: "10px 12px", background: "var(--bg-soft)", border: "1px solid var(--line)", borderRadius: 10 }}>
                  <div style={{ fontSize: 10.5, color: "var(--ink-3)", textTransform: "uppercase", letterSpacing: "0.08em" }}>{k}</div>
                  <div style={{ fontSize: 12.5, marginTop: 3, color: "var(--ink-1)", fontWeight: 500 }}>{v || "—"}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="card card-pad">
            <h3 style={{ margin: 0, fontSize: 14 }}>Validasi Server-side</h3>
            <div style={{ color: "var(--ink-3)", fontSize: 11.5, marginTop: 2 }}>Log dari proses validasi terakhir</div>
            <div className="terminal" style={{ marginTop: 12 }}>
              <div><span className="prompt">$</span> siap validate surat {p.kode}</div>
              <div className="dim">[INFO] memvalidasi struktur surat tanah…</div>
              <div className="ok">[ OK ] nomor surat tanah unik ✓</div>
              <div className="ok">[ OK ] luas dan alamat lengkap ✓</div>
              {archives.length > 0
                ? <div className="ok">[ OK ] chain-of-title {archives.length} simpul utuh ✓</div>
                : <div className="warn">[WARN] belum ada arsip SPPHT terkait</div>}
              {p.status === "sengketa"
                ? <div className="err">[ERR ] surat tanah ditandai SENGKETA — peralihan ditangguhkan</div>
                : <div className="ok">[ OK ] status surat tanah siap untuk peralihan baru ✓</div>}
              <div className="dim">selesai dalam 84ms</div>
            </div>
          </div>
        </div>
      </div>

      <Modal
        open={!!previewDoc}
        onClose={() => setPreviewDoc(null)}
        title={previewDoc ? `Pratinjau: ${previewDoc.doc}` : ""}
        subtitle={previewDoc ? `${previewDoc.archive.nomorSPPHT} · ${SIADP.formatDate(previewDoc.archive.tanggal)}` : ""}
        size="lg"
        footer={<>
          <Btn variant="ghost" icon="x" onClick={() => setPreviewDoc(null)}>Tutup</Btn>
          <Btn variant="subtle" icon="upload">Unduh salinan</Btn>
        </>}
      >
        {previewDoc && previewDoc.doc === "Surat Tanah" ? (
          <div className="surat-preview">
            <div className="kop">
              <div className="l1">PEMERINTAH KOTA BONTANG</div>
              <div className="l2">KECAMATAN BONTANG UTARA</div>
              <div className="l3">KELURAHAN {(p.kelurahan || "LOKTUAN").toUpperCase()} — KALIMANTAN TIMUR</div>
            </div>
            <div className="body">
              <div className="judul">SURAT PERNYATAAN PENGUASAAN FISIK DAN PENGGUNAAN TANAH</div>
              <dl className="kv">
                <dt>Nama</dt><dd>{p.nama || p.pemilikSaatIni}</dd>
                <dt>Nomor Surat</dt><dd className="mono">{p.nomorSurat || "—"}</dd>
                <dt>Jenis Surat</dt><dd>{p.jenisSurat || "SPPHT"}</dd>
              </dl>
              <div className="section-label" style={{ marginTop: 16 }}>Letak Tanah</div>
              <dl className="kv">
                <dt>Lokasi</dt><dd>{p.alamat}</dd>
                <dt>RT</dt><dd>{p.rt}</dd>
                <dt>Kelurahan</dt><dd>{p.kelurahan || "Loktuan"}</dd>
                <dt>Luas Tanah</dt><dd>± {p.luas} m²</dd>
              </dl>
              <div style={{ marginTop: 18, color: "var(--ink-3)", fontSize: 11.5 }}>[Halaman pratinjau dokumen — tampilan simulasi untuk uji alur arsip digital. Sistem akan menampilkan PDF/JPG hasil scan asli pada implementasi sesungguhnya.]</div>
            </div>
          </div>
        ) : previewDoc && (
          <div className="doc-preview">
            <div style={{ textAlign: "center", fontWeight: 700, fontSize: 13, color: "var(--ink-1)", letterSpacing: "0.1em" }}>— {previewDoc.doc.toUpperCase()} —</div>
            <div style={{ marginTop: 16 }}>Nomor SPPHT: <b>{previewDoc.archive.nomorSPPHT}</b></div>
            <div>Surat tanah: {p.kode} — {p.alamat}</div>
            <div>Jenis peralihan: {previewDoc.archive.jenis}</div>
            <div>Tanggal: {SIADP.formatDate(previewDoc.archive.tanggal)}</div>
            <div style={{ marginTop: 14 }}>Pengalih: {previewDoc.archive.pengalih.nama} · NIK {SIADP.maskNik(previewDoc.archive.pengalih.nik)}</div>
            <div>Penerima: {previewDoc.archive.penerima.nama} · NIK {SIADP.maskNik(previewDoc.archive.penerima.nik)}</div>
            <div style={{ marginTop: 18, color: "var(--ink-3)" }}>[Halaman pratinjau dokumen — tampilan simulasi untuk uji alur arsip digital]</div>
            <div style={{ marginTop: 8, color: "var(--ink-3)" }}>Sistem akan menampilkan PDF/JPG asli pada implementasi sesungguhnya.</div>
          </div>
        )}
      </Modal>
    </div>
  );
}

mountPage({
  active: "data-tanah",
  title: "Detail Riwayat Kepemilikan",
  sub: "Chain of title surat tanah.",
  crumbs: ["Beranda", "Data Tanah", "Detail Riwayat"],
  render: ({ state }) => <DetailRiwayat state={state} parcelId={getParam("parcel")} go={go}/>,
});
  </script>
</body>
</html>
